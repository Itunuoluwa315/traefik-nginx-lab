api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "tcp://docker_proxy:2375"
    exposedByDefault: false
    network: nginx_proxy_network

tls:
  certificates:
    - certFile: /certs/cert.pem
      keyFile: /certs/key.pem