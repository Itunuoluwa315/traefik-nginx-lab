server {
    listen 2375;

    location ~ ^/v1\.[0-9]+/(.*)$ {
        proxy_pass http://host.docker.internal:2375/v1.44/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300;
    }

    location / {
        proxy_pass http://host.docker.internal:2375;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300;
    }
}